# Nginx reverse-proxy configuration for the Abaku Node server.                                                
# Copy to /etc/nginx/http.d/abaku.conf and set server_name for production.                                    
                                                                                                              
server {                                                                                                      
    listen 80;                                                                                                
    listen [::]:80;                                                                                           
                                                                                                              
    server_name abaku.capital www.abaku.capital;                                                              
    access_log /var/log/nginx/abaku.capital.access.log;                                                       
    error_log /var/log/nginx/abaku.capital.error.log;                                                         
                                                                                                              
    location / {                                                                                              
        proxy_pass http://127.0.0.1:4173;                                                                     
        proxy_http_version 1.1;                                                                               
        proxy_set_header Host $host;                                                                          
        proxy_set_header X-Real-IP $remote_addr;                                                              
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;                                          
        proxy_set_header X-Forwarded-Proto $scheme;                                                           
    }                                                                                                                                            
}                                                                                                             